name: Test & Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install GDB
        run: |
          sudo apt-get update
          sudo apt-get install -y gdb gcc

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/live_test.py --ignore=tests/test_integration.py -k "not integration"

      - name: Run integration tests
        run: python -m pytest tests/test_integration.py -v --tb=short || echo "Integration tests skipped (GDB environment)"

      - name: Run live test
        run: timeout 120 python tests/live_test.py || echo "Live test skipped"

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install build twine
      - run: python3 -m build
      - run: python3 -m twine upload dist/* --non-interactive --username __token__ --password ${{ secrets.PYPI_TOKEN }}
