name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install GDB
        run: |
          sudo apt-get update
          sudo apt-get install -y gdb gcc

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/live_test.py --ignore=tests/test_integration.py -k "not integration"

      - name: Run integration tests
        run: python -m pytest tests/test_integration.py -v --tb=short || echo "Integration tests skipped (GDB environment)"

      - name: Run live test
        run: timeout 120 python tests/live_test.py || echo "Live test skipped"
