[project]
name = "edb-debugger-mcp"
version = "1.0.0"
description = "MCP server providing full EDB (Evan's Debugger) functionality via a GDB MI backend"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "pydantic>=2.0.0",
]

[project.urls]
Homepage = "https://github.com/YOUR_USERNAME/edb-debugger-mcp"
Repository = "https://github.com/YOUR_USERNAME/edb-debugger-mcp"

[tool.mcp]
name = "edb_debugger_mcp"
server = "edb_debugger_mcp:mcp"
transport = "stdio"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
edb-debugger-mcp = "edb_debugger_mcp:main"
